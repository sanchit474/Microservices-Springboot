server:
  port: 8082
spring:
  application:
    name: HOTEL-SERVICE
  datasource:
    url: jdbc:postgresql://<your-host>:<port>/<database>?sslmode=require
    username: <your-username>
    password: <your-password>

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/