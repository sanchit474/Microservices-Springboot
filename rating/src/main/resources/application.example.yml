server:
  port: 8083
spring:
  application:
    name: RATING-SERVICE
  data:
    mongodb:
      uri: mongodb+srv://<username>:<password>@<cluster>/<database>?authSource=admin
      auto-index-creation: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/